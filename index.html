<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gëzuar Ditëlindjen Harri!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            color: #333;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #2c3e50;
            font-size: 2.8em;
            margin-bottom: 10px;
        }
        .highlight {
            color: #e74c3c;
        }
        p {
            font-size: 1.2em;
            line-height: 1.6;
            color: #555;
            margin-bottom: 30px;
        }
        .btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }
        .btn:hover {
            background-color: #c0392b;
            transform: translateY(-2px);
        }
        #surprise {
            display: none;
            margin-top: 25px;
            font-size: 1.5em;
            color: #27ae60;
            font-weight: bold;
            animation: fadeIn 1s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🎉 Gëzuar Ditëlindjen, <span class="highlight">Harri!</span> 🎂</h1>
        <p>Të uroj nga zemra edhe 100 vite të tjera të mbushura me shëndet. Dhe qifsh sa me shum pidha</p>
        
        <button class="btn" onclick="tregoSurprizen()">Kliko për një Surprizë 🎁</button>
        
        <div id="surprise">
            🎈 Qofsh gjithmonë i rrethuar me dashuri! Gëzuar! 🥂
        </div>
    </div>

    <!-- Këtu është shtuar muzika duke përdorur linkun e drejtpërdrejtë (raw) nga GitHub -->
    <audio id="birthdayAudio" src="https://raw.githubusercontent.com/endri73/Noah-edhe-100/main/Music/HAPPYBirthdaySong.mp3"></audio>

    <script>
        function tregoSurprizen() {
            // Shfaq mesazhin e surprizës
            var surpriza = document.getElementById('surprise');
            surpriza.style.display = 'block';
            
            // Fillo muzikën
            var muzika = document.getElementById('birthdayAudio');
            muzika.play();
        }
    </script>

</body>
</html>
